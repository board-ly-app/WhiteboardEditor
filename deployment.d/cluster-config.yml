apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: ${WHITEBOARD_EDITOR_HTTP_PORT}
        protocol: TCP
      - containerPort: 30443
        hostPort: ${WHITEBOARD_EDITOR_HTTPS_PORT}
        protocol: TCP
